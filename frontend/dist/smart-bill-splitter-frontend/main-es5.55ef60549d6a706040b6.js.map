export default "<div class=\"app-shell\">\n  <header class=\"top-nav\">\n    <div class=\"nav-inner\">\n      <a routerLink=\"/\" class=\"brand\">\n        <span class=\"brand-mark\">S</span>\n        <span class=\"brand-name\">Smart Bill Splitter</span>\n      </a>\n      <nav class=\"nav-links\">\n        <a routerLink=\"/\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">New Split</a>\n        <a routerLink=\"/history\" routerLinkActive=\"active\">History</a>\n        <a routerLink=\"/contacts\" routerLinkActive=\"active\">Contacts</a>\n      </nav>\n    </div>\n  </header>\n\n  <main class=\"main-content\">\n    <router-outlet></router-outlet>\n  </main>\n\n  <!-- Global toast notifications -->\n  <div class=\"toast-wrap\">\n    <div\n      *ngFor=\"let toast of toasts\"\n      class=\"toast\"\n      [class.toast-success]=\"toast.type === 'success'\"\n      [class.toast-error]=\"toast.type === 'error'\"\n    >\n      <span>{{ toast.type === 'success' ? '✓' : '!' }}</span>\n      <span>{{ toast.message }}</span>\n    </div>\n  </div>\n</div>\n";
